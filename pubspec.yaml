name: tagaddod_shaker
description: "Reusable shaker host and trigger for requests_inspector integration."
version: 0.1.0
homepage: https://github.com/alisabry72/tagaddod_shaker
publish_to: "none"

environment:
  sdk: ^3.10.1
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  connectivity_plus: ^6.1.5
  dartz: ^0.10.1
  device_info_plus: ^12.1.0
  equatable: ^2.0.5
  firebase_remote_config: ^5.4.7
  flutter_bloc: ^9.0.0
  flutter_image_compress: ^2.4.0
  get_it: ^8.2.0
  hive_flutter: ^1.1.0
  http: ^1.3.0
  json_annotation: ^4.9.0
  package_info_plus: ^8.3.1
  requests_inspector: ^4.2.1
  sensors_plus: ^6.1.0
  shared_preferences: ^2.0.15
  fly_networking:
    git:
      url: https://github.com/alisabry72/fly.git
      ref: flutter_v3.27.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

